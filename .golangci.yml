run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose
    - gocritic

linters-settings:
  revive:
    rules:
      - name: exported
      - name: error-return
      - name: error-naming

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
